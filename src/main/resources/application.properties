## Database Configuration - Supabase/Postgres
# Recommended: set these via environment variables from your Supabase project.
# Example (Windows PowerShell):
# $env:SPRING_DATASOURCE_URL = "jdbc:postgresql://<DB_HOST>:6543/<DB_NAME>?pgbouncer=true"
# $env:SPRING_DATASOURCE_USERNAME = "<DB_USER>"
# $env:SPRING_DATASOURCE_PASSWORD = "<DB_PASS>"
# Supabase requires SSL — append ?sslmode=require to your connection URL
# IMPORTANT: Use port 6543 with PgBouncer for connection pooling, not port 5432
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

## HikariCP Connection Pool Configuration
# For local development (default profile)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE:0}

## JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

## Redis Configuration
# Use environment variables for production/remote Redis instances
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.timeout=${SPRING_REDIS_TIMEOUT:2000}
spring.redis.connect-timeout=${SPRING_REDIS_CONNECT_TIMEOUT:2000}
spring.cache.type=redis
spring.cache.redis.time-to-live=${SPRING_CACHE_TTL_MS:3600000}

## Application Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=construction-hrms

## Pagination Configuration
spring.data.web.pageable.default-page-size=${PAGEABLE_DEFAULT_PAGE_SIZE:20}
spring.data.web.pageable.max-page-size=${PAGEABLE_MAX_PAGE_SIZE:100}
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size

## CORS Configuration
# Comma-separated list of allowed origins for frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
# Allowed HTTP methods
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
# Allowed headers (use * for all)
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
# Allow credentials (cookies, authorization headers)
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
# Max age for preflight requests in seconds
cors.max-age=${CORS_MAX_AGE:3600}
