## Staging Environment Configuration
# This profile is for staging/production environments using Supabase

## Database Configuration - Supabase with PgBouncer
# IMPORTANT: Use port 6543 for PgBouncer connection pooling
# Add ?pgbouncer=true to the connection URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:6543/postgres?pgbouncer=true&sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

## HikariCP Connection Pool Configuration for Supabase
# Supabase drops idle connections after 300 seconds (5 minutes)
# Set max-lifetime to 270 seconds (4.5 minutes) to avoid using dead connections
# Enable keepalive to keep connections warm
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:270000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:270000}
spring.datasource.hikari.keepalive-time=${HIKARI_KEEPALIVE:30000}

## JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

## Redis Configuration
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.timeout=${SPRING_REDIS_TIMEOUT:2000}
spring.redis.connect-timeout=${SPRING_REDIS_CONNECT_TIMEOUT:2000}
spring.cache.type=redis
spring.cache.redis.time-to-live=${SPRING_CACHE_TTL_MS:3600000}

## Application Configuration
server.port=${SERVER_PORT:8080}
spring.application.name=construction-hrms

## Pagination Configuration
spring.data.web.pageable.default-page-size=${PAGEABLE_DEFAULT_PAGE_SIZE:20}
spring.data.web.pageable.max-page-size=${PAGEABLE_MAX_PAGE_SIZE:100}
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size

## CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
cors.max-age=${CORS_MAX_AGE:3600}
